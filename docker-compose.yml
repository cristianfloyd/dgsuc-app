# DGSUC - Entorno Docker
# Base de datos principal: contenedor PostgreSQL
# Bases secundarias (Mapuche, etc.): host (host.docker.internal → misma base en el host)

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: dgsuc-app
    restart: unless-stopped
    working_dir: /var/www/html
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: https://informes-app.test
      # Base principal → contenedor PostgreSQL
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-suc_app}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Secundarias → PostgreSQL del host (una misma base para todas)
      DB_TEST_HOST: host.docker.internal
      DB_TEST_PORT: ${DB_HOST_SECONDARY_PORT:-5432}
      DB_TEST_DATABASE: ${DB_HOST_SECONDARY_DATABASE:-desa}
      DB_TEST_USERNAME: ${DB_HOST_SECONDARY_USERNAME:-postgres}
      DB_TEST_PASSWORD: ${DB_HOST_SECONDARY_PASSWORD:-postgres}
      DB_TEST_R2_HOST: host.docker.internal
      DB_TEST_R2_PORT: ${DB_HOST_SECONDARY_PORT:-5432}
      DB_TEST_R2_USERNAME: ${DB_HOST_SECONDARY_USERNAME:-postgres}
      DB_TEST_R2_PASSWORD: ${DB_HOST_SECONDARY_PASSWORD:-postgres}
      DB_PROD_HOST: host.docker.internal
      DB_PROD_PORT: ${DB_HOST_SECONDARY_PORT:-5432}
      DB7_HOST: host.docker.internal
      DB7_PORT: ${DB_HOST_SECONDARY_PORT:-5432}
      DB8_HOST: host.docker.internal
      DB8_PORT: ${DB_HOST_SECONDARY_PORT:-5432}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Sesión y colas
      SESSION_DRIVER: database
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # En Linux: permite que el contenedor resuelva host.docker.internal al host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dgsuc

  nginx:
    image: nginx:alpine
    container_name: dgsuc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - dgsuc

  db:
    image: postgres:17-alpine
    container_name: dgsuc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-suc_app}
    volumes:
      - dgsuc_db_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-suc_app}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dgsuc

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis_dev_password_456}"]
    container_name: dgsuc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - dgsuc_redis_data:/data
    networks:
      - dgsuc

networks:
  dgsuc:
    driver: bridge

volumes:
  dgsuc_db_data:
  dgsuc_redis_data:
