# informes-app.test - HTTP → HTTPS
server {
    listen 80;
    server_name informes-app.test;
    return 301 https://$server_name$request_uri;
}

# informes-app.test - HTTPS + Laravel
server {
    listen 443 ssl http2;
    server_name informes-app.test;

    root /var/www/html/public;
    index index.php;

    ssl_certificate     /etc/nginx/certs/informes-app.test.pem;
    ssl_certificate_key /etc/nginx/certs/informes-app.test-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    charset utf-8;
    client_max_body_size 128M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffering off;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
