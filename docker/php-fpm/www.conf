[www]
user = appuser
group = appuser
listen = 9000
listen.owner = appuser
listen.group = appuser
listen.mode = 0660

pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
pm.process_idle_timeout = 10s
pm.max_requests = 500

clear_env = no

catch_workers_output = yes
decorate_workers_output = no
